name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt
        run: |
          curl -L -o binaryen.tar.gz https://github.com/WebAssembly/binaryen/releases/download/version_117/binaryen-version_117-x86_64-linux.tar.gz
          tar xf binaryen.tar.gz
          echo "$PWD/binaryen-version_117/bin" >> "$GITHUB_PATH"

      - name: Build WASM bundle
        run: |
          wasm-pack build \
            --release \
            --target web \
            --no-opt \
            --out-dir demo/pkg \
            --out-name wasmicro \
            --features wasm

      - name: Optimize WASM size
        run: |
          wasm-opt \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-simd \
            -Oz \
            demo/pkg/wasmicro_bg.wasm \
            -o demo/pkg/wasmicro_bg.wasm

      - name: Report bundle size
        run: |
          echo "WASM bundle size:"
          ls -lh demo/pkg/wasmicro_bg.wasm
          du -b demo/pkg/wasmicro_bg.wasm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
